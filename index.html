<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mol* Viewer Setup</title>
    <script src="https://unpkg.com/molstar/build/viewer/molstar.js"></script>
    <style>
        #molstar { width: 100%; height: 600px; }
        button { margin: 10px; padding: 10px; }
    </style>
</head>
<body>
    <h2>Mol* Protein Viewer</h2>
    <div id="molstar"></div>
    <button onclick="loadProtein()">Load Protein (3K8Y)</button>

    <script>
        let viewer;

        async function setupMolstar() {
            viewer = new molstar.Viewer('molstar'); // Initialize viewer
            console.log("Mol* viewer initialized.");
        }

        async function loadProtein() {
            if (!viewer) {
                console.error("Mol* viewer is not initialized yet.");
                return;
            }
            try {
                console.log("Loading protein 3K8Y...");
                await viewer.loadStructureFromUrl('https://files.rcsb.org/download/3K8Y.pdb', 'pdb');
                console.log("Protein 3K8Y loaded successfully!");
            } catch (error) {
                console.error("Error loading protein:", error);
            }
        }

        // Ensure Mol* is fully loaded before interacting
        window.onload = async () => {
            await setupMolstar();
        };
    </script>
</body>
</html>
