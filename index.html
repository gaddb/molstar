<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mol* Viewer on GitHub Pages</title>
    <script src="https://cdn.jsdelivr.net/npm/molstar/build/viewer/molstar.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; }
        #molstar { width: 100%; height: 600px; margin: auto; border: 1px solid #ccc; }
        button { margin: 10px; padding: 10px; font-size: 16px; }
    </style>
</head>
<body>
    <h1>Mol* Protein Viewer</h1>
    <div id="molstar"></div>
    <button onclick="loadProtein()">Load Protein (1CRN)</button>

    <script>
        let viewer;

        async function setupMolstar() {
            try {
                console.log("⏳ Initializing Mol* Viewer...");
                viewer = new molstar.Viewer('molstar', { layoutIsExpanded: true });

                console.log("✅ Mol* Viewer initialized!");

                // Wait until Mol* is fully ready before resizing
                await waitForMolstarReady();
                viewer.handleResize();
                console.log("✅ Mol* Viewer resized successfully!");
                
            } catch (error) {
                console.error("❌ Error initializing Mol*:", error);
                alert("Error: Mol* viewer could not be initialized.");
            }
        }

        async function waitForMolstarReady() {
            console.log("⏳ Waiting for Mol* to be fully ready...");
            let attempts = 0;
            while (!viewer?.plugin?.canvas3d && attempts < 10) {
                await new Promise(resolve => setTimeout(resolve, 500));
                attempts++;
            }
            if (!viewer?.plugin?.canvas3d) {
                console.warn("⚠ Mol* Viewer is still not fully ready after waiting.");
            } else {
                console.log("✅ Mol* Viewer is now fully ready!");
            }
        }

        async function loadProtein() {
            if (!viewer) {
                console.error("❌ Mol* viewer is not initialized yet.");
                alert("Error: Mol* viewer is not initialized yet.");
                return;
            }

            try {
                console.log("⏳ Fetching protein 1CRN...");
                const response = await fetch('https://files.rcsb.org/download/1CRN.pdb');

                if (!response.ok) {
                    throw new Error(`❌ Failed to fetch PDB file: ${response.status} ${response.statusText}`);
                }

                const pdbData = await response.text();
                console.log("✅ PDB data fetched successfully!");

                console.log("⏳ Loading structure into Mol*...");

                // Use Mol* plugin API to properly process and load structure
                const data = await viewer.plugin.builders.data.rawData({ data: pdbData, label: '1CRN' });
                const trajectory = await viewer.plugin.builders.structure.parseTrajectory(data, 'pdb');
                await viewer.plugin.builders.structure.hierarchy.applyPreset(trajectory, 'default');

                console.log("✅ Protein 1CRN loaded successfully!");

                // Ensure Mol* resizes after the structure is loaded
                await waitForMolstarReady();
                viewer.handleResize();
                console.log("✅ Mol* Viewer resized successfully after loading protein!");

            } catch (error) {
                console.error("❌ Error loading protein:", error);
                alert(`Error loading protein: ${error.message}. See console for details.`);
            }
        }

        window.onload = setupMolstar;
    </script>
</body>
</html>
