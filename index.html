<script>
    let viewer;

    async function setupMolstar() {
        try {
            viewer = new molstar.Viewer('molstar'); // Initialize viewer
            console.log("Mol* Viewer initialized!");
        } catch (error) {
            console.error("Error initializing Mol*:", error);
        }
    }

    async function loadProtein() {
        // Ensure viewer is initialized
        if (!viewer || !viewer.plugin || !viewer.plugin.managers) {
            console.error("Mol* viewer is not properly initialized yet.");
            return;
        }
        try {
            console.log("Loading protein 1CRN...");
            // Wait a moment to ensure Mol* is fully initialized
            await new Promise(resolve => setTimeout(resolve, 1000));
            await viewer.loadStructureFromUrl('https://files.rcsb.org/download/1CRN.pdb', 'pdb');
            console.log("Protein 1CRN loaded successfully!");
        } catch (error) {
            console.error("Error loading protein:", error);
        }
    }

    window.onload = async () => {
        await setupMolstar();
    };
</script>
